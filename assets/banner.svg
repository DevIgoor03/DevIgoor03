<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" fill="none" role="img" aria-label="Igor - Full Stack Developer">
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.1" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <clipPath id="panel">
      <rect x="1" y="1" width="878" height="238" rx="18"/>
    </clipPath>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="878" height="238" rx="18" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1.5"/>

  <g clip-path="url(#panel)">
    <rect x="1" y="1" width="878" height="238" fill="url(#dots)"/>
    <!-- animated scanline -->
    <rect x="1" y="-70" width="878" height="70" fill="url(#scan)">
      <animate attributeName="y" values="-70;240" dur="5.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- corner brackets -->
  <g stroke="#333333" stroke-width="1.5" fill="none">
    <path d="M24 44 L24 24 L44 24"/>
    <path d="M856 44 L856 24 L836 24"/>
    <path d="M24 196 L24 216 L44 216"/>
    <path d="M856 196 L856 216 L836 216"/>
  </g>

  <!-- top-left label -->
  <text x="52" y="50" font-family="ui-monospace,'SFMono-Regular','Cascadia Code','Courier New',monospace" font-size="12" letter-spacing="3" fill="#565656">// FULL—STACK · SOFTWARE</text>

  <!-- top-right status -->
  <circle cx="746" cy="46" r="4" fill="#e8e8e8">
    <animate attributeName="fill-opacity" values="1;0.15;1" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <text x="852" y="50" text-anchor="end" font-family="ui-monospace,'Courier New',monospace" font-size="12" letter-spacing="3" fill="#7f7f7f">AVAILABLE</text>

  <!-- name -->
  <text x="440" y="142" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular','Cascadia Code','Courier New',monospace" font-size="94" font-weight="700" letter-spacing="14" fill="#f6f6f6" filter="url(#glow)">IGOR</text>

  <!-- blinking cursor -->
  <rect x="598" y="92" width="9" height="46" fill="#e8e8e8">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.06s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="440" y="184" text-anchor="middle" font-family="ui-monospace,'Courier New',monospace" font-size="13" letter-spacing="7" fill="#6f6f6f">FULL-STACK DEVELOPER</text>

  <!-- accent underline -->
  <line x1="384" y1="202" x2="496" y2="202" stroke="url(#accent)" stroke-width="1.5"/>

  <!-- bottom labels -->
  <text x="52" y="222" font-family="ui-monospace,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#454545">@DevIgoor03</text>
  <text x="828" y="222" text-anchor="end" font-family="ui-monospace,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#454545">EST · 2026</text>
</svg>
